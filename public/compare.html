<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compare Cars - Toyota Fuel Economy</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <img src="https://www.toyota.com/imgix/responsive/images/Toyota_H1_SansSerif_Logo.png" alt="Toyota Logo">
            <h1>Fuel Economy</h1>
        </div>
        <nav>
            <ul>
                <li><a href="main.html">Dashboard</a></li>
                <li><a href="compare.html" class="active">Compare Cars</a></li>
                <li><a href="welcome.html">Logout</a></li>
            </ul>
        </nav>
    </header>

    <div class="container">
        <div class="card">
            <h2>Compare Toyota Vehicles</h2>
            <div id="numCarsForm">
                <div class="form-group">
                    <label for="numCars">How many cars would you like to compare? (1-3)</label>
                    <input type="number" id="numCars" name="numCars" min="1" max="3" value="2">
                </div>
                <button id="numCarsSubmit" class="btn-primary">Next</button>
            </div>

            <div id="carSelectionForm" style="display: none;">
                <!-- Dynamically populated car selection form -->
                <button id="compareSubmit" class="btn-primary">Compare Cars</button>
            </div>

            <div id="compareResults" class="results-panel" style="display: none;">
                <h3>Comparison Results</h3>
                <div class="chart-container">
                    <canvas id="compareChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-content">
            
            <div class="footer-links">
                <a href="#">Privacy Policy</a>
                <a href="#">Terms of Service</a>
                <a href="#">Contact Us</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
