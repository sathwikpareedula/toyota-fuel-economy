<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuel Economy Results</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <h1>Fuel Economy Results</h1>
    </header>

    <div class="container">
        <div id="results">
            <p>City MPG: <span id="cityMPG"></span></p>
            <p>Highway MPG: <span id="highwayMPG"></span></p>
            <p>Combined MPG: <span id="combinedMPG"></span></p>
        </div>

        <canvas id="fuelEconomyChart" width="400" height="200"></canvas>
    </div>

    <footer>
        <p>&copy; 2023 Toyota Motor Corporation</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
